[pytest]
minversion = 7.4
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)-8s %(name)s %(message)s
log_date_format = %H:%M:%S
markers =
    cpu: tests that exercise CPU compute
    memory: tests that exercise the memory subsystem
    gpu: tests that require NVIDIA GPU(s)
    nvlink: tests that require NVLink fabric
    pcie: tests that measure PCIe host<->device bandwidth
    bottleneck: bottleneck / roofline analysis tests
    slow: tests that take more than 30 s to complete
